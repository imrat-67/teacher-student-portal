<div class="form-full">
              <label class="form-label">Problem Statement</label>
              <textarea id="qStatement" class="form-input" placeholder="Describe the problem..."></textarea>
            </div>
            <div class="form-full">
              <label class="form-label">Example (Input/Output)</label>
              <textarea id="qExample" class="form-input" placeholder="e.g. Input: 5, Output: 25"></textarea>
            </div>
            <div class="form-full">
              <button class="btn-add-q" onclick="addNewProblem()">Create Problem ✨</button>
            </div>
          </div>
        </div>

        <div id="teacherProblemsList"></div>
      </div>

      <div id="view-teacherSessions" style="display:none">
        <div class="page-header">
          <div>
            <div class="page-title">Live Sessions</div>
            <div class="page-subtitle">Create and manage real-time coding rooms</div>
          </div>
        </div>

        <div class="session-creator">
          <h3>🚀 Start New Session</h3>
          <div class="input-row">
            <input type="text" id="newSessionName" class="form-input-sm" placeholder="Session Name (e.g. Lab 04)">
            <button class="btn-create" onclick="createSession()">Generate Session Code</button>
          </div>
        </div>

        <div class="sessions-list" id="activeSessionsList"></div>
      </div>

      <div id="view-teacherSubmissions" style="display:none">
        <div class="page-header">
          <div>
            <div class="page-title">Student Submissions</div>
            <div class="page-subtitle">Review code and images from all students</div>
          </div>
        </div>
        <div id="allSubsList"></div>
      </div>

    </main>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // --- INITIAL DATA ---
  let problems = JSON.parse(localStorage.getItem('cr_problems')) || [
    { id: 1, title: "Factorial Calculation", section: "Numbers & Math", difficulty: "Easy", concept: "Recursion", solved: false, statement: "Write a function to find the factorial of N.", example: "Input: 5\nOutput: 120" },
    { id: 2, title: "Palindrome Check", section: "Strings", difficulty: "Medium", concept: "Slicing", solved: false, statement: "Check if a given string is a palindrome.", example: "Input: 'racecar'\nOutput: true" }
  ];
  
  let submissions = JSON.parse(localStorage.getItem('cr_subs')) || [];
  let sessions = JSON.parse(localStorage.getItem('cr_sessions')) || [];
  let currentUser = JSON.parse(localStorage.getItem('cr_user')) || null;
  let activeSessionCode = null;

  // --- AUTH LOGIC ---
  function checkAuth() {
    const isTeacherUrl = window.location.search.includes('teacher');
    if (currentUser) {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('teacherAuthScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
      setupUI(currentUser.role);
    } else {
      if (isTeacherUrl) {
        document.getElementById('teacherAuthScreen').classList.add('active');
      } else {
        document.getElementById('authScreen').classList.add('active');
      }
    }
  }

  function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    if (!email) return showError('authError', 'Please enter an email');
    
    currentUser = { name: email.split('@')[0], email, role: 'student' };
    localStorage.setItem('cr_user', JSON.stringify(currentUser));
    location.reload();
  }

  function handleTeacherAuth() {
    const pass = document.getElementById('teacherMasterPass').value;
    if (pass === 'admin123') { // Simple demo password
      currentUser = { name: 'Admin Instructor', email: 'admin@coderoom.io', role: 'teacher' };
      localStorage.setItem('cr_user', JSON.stringify(currentUser));
      location.reload();
    } else {
      showError('teacherAuthError', 'Invalid Master Password');
    }
  }

  function handleLogout() {
    localStorage.removeItem('cr_user');
    location.reload();
  }

  // --- NAVIGATION ---
  function setupUI(role) {
    document.getElementById('navUserName').innerText = currentUser.name;
    const badge = document.getElementById('navRoleBadge');
    badge.innerText = role.toUpperCase();
    badge.className = `nav-badge badge-${role}`;

    if (role === 'teacher') {
      document.getElementById('studentSidebar').style.display = 'none';
      document.getElementById('teacherSidebar').style.display = 'block';
      showTeacherView('manageProblems');
    } else {
      renderStudentProblems();
    }
  }

  function showView(view) {
    ['view-problems', 'view-mySubmissions'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById(`view-${view}`).style.display = 'block';
    
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if (view === 'mySubmissions') renderMySubmissions();
    if (view === 'problems') renderStudentProblems();
  }

  function showTeacherView(view) {
    const views = ['teacherProblems', 'teacherSessions', 'teacherSubmissions'];
    views.forEach(v => document.getElementById(`view-${v}`).style.display = 'none');
    
    const target = view.replace('manage', 'teacher').replace('view', 'teacher');
    document.getElementById(`view-${target}`).style.display = 'block';
    
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    if (view === 'manageProblems') renderTeacherProblems();
    if (view === 'manageSessions') renderSessions();
    if (view === 'viewSubmissions') renderAllSubmissions();
  }

  // --- CORE FUNCTIONALITY ---
  function renderStudentProblems() {
    const list = document.getElementById('problemsList');
    const sections = [...new Set(problems.map(p => p.section))];
    
    // Render Section Tabs
    const tabRow = document.getElementById('sectionTabsRow');
    tabRow.innerHTML = `<button class="tab-chip active">All Problems</button>` + 
      sections.map(s => `<button class="tab-chip">${s}</button>`).join('');

    // Render Problems
    list.innerHTML = problems.map(p => `
      <div class="problem-card ${p.solved ? 'solved' : ''}" onclick="toggleCard(${p.id})">
        <div class="card-row">
          <div class="card-check ${p.solved ? 'checked' : ''}">✔</div>
          <div class="card-num">#${p.id}</div>
          <div class="card-title ${p.solved ? 'solved-title' : ''}">${p.title}</div>
          <div class="diff-badge diff-${p.difficulty.toLowerCase()}">${p.difficulty}</div>
        </div>
        <div class="card-body" id="body-${p.id}" style="display:none" onclick="event.stopPropagation()">
          <div class="card-inner">
            <div class="block block-problem">
              <div class="block-label">The Challenge</div>
              <div class="block-text">${p.statement}</div>
            </div>
            <div class="block block-example">
              <div class="block-label">Example</div>
              <pre class="block-pre">${p.example}</pre>
            </div>
            <textarea class="code-textarea" id="code-${p.id}" placeholder="Write your solution here..."></textarea>
            <div class="submit-row">
              <button class="btn-submit" onclick="submitSolution(${p.id})">Submit Solution</button>
              <span class="submitted-badge" id="badge-${p.id}">Success! Solution stored.</span>
            </div>
          </div>
        </div>
      </div>
    `).join('');
    
    updateProgress();
  }

  function toggleCard(id) {
    const body = document.getElementById(`body-${id}`);
    body.style.display = body.style.display === 'none' ? 'block' : 'none';
  }

  function submitSolution(id) {
    const code = document.getElementById(`code-${id}`).value;
    if (!code) return showToast("Please write some code first!", "error");
    
    const sub = {
      id: Date.now(),
      problemId: id,
      user: currentUser.name,
      code: code,
      timestamp: new Date().toLocaleString(),
      session: activeSessionCode
    };
    
    submissions.push(sub);
    localStorage.setItem('cr_subs', JSON.stringify(submissions));
    
    const prob = problems.find(p => p.id === id);
    prob.solved = true;
    localStorage.setItem('cr_problems', JSON.stringify(problems));
    
    document.getElementById(`badge-${id}`).classList.add('visible');
    showToast("Solution submitted successfully!", "success");
    updateProgress();
  }

  function updateProgress() {
    const solvedCount = problems.filter(p => p.solved).length;
    const percent = (solvedCount / problems.length) * 100;
    document.getElementById('progressFill').style.width = `${percent}%`;
    document.getElementById('progressCounter').innerText = `${solvedCount}/${problems.length}`;
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // --- UTILS ---
  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 3000);
  }

  // Init
  checkAuth();
</script>

</body>
</html>
